<!-- frontend/pages/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PeakTrader</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
  <nav class="auth-nav">
    <a href="index.html" class="logo" style="font-family: var(--font-head); font-size: 1.25rem; font-weight: 800; text-decoration: none; color: var(--text);">
      Peak<span style="color: var(--accent);">Trader</span>
    </a>
    <a href="index.html" style="color: var(--muted2); text-decoration: none; font-size: 14px;">← Back to Home</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">Peak<span>Trader</span></div>
      <div class="auth-sub">Sign in to your trading account</div>

      <div class="error-message" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="trader@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <label class="checkbox-wrap">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <button type="button" class="auth-link">Forgot password?</button>
        </div>

        <button type="submit" class="btn-full">Sign In</button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Don't have an account? <a href="register.html" class="auth-link">Create one free</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
