<!-- frontend/pages/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — PeakTrader</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page" data-page="register">
  <nav class="auth-nav">
    <a href="index.html" class="logo" style="font-family: var(--font-head); font-size: 1.25rem; font-weight: 800; text-decoration: none; color: var(--text);">
      Peak<span style="color: var(--accent);">Trader</span>
    </a>
    <a href="index.html" style="color: var(--muted2); text-decoration: none; font-size: 14px;">← Back to Home</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">Peak<span>Trader</span></div>
      <div class="auth-sub">Create your free trading account in 60 seconds</div>

      <div class="error-message" id="registerError"></div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" id="firstName" placeholder="John" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" id="lastName" placeholder="Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Phone (M-Pesa Number)</label>
          <input type="tel" class="form-input" id="phone" placeholder="+254 7XX XXX XXX" required>
          <div class="form-hint">Used for deposits and withdrawals</div>
        </div>

        <div class="form-group">
          <label class="form-label">Country</label>
          <select class="form-select" id="country">
            <option value="Kenya" selected>Kenya</option>
            <option value="Uganda">Uganda</option>
            <option value="Tanzania">Tanzania</option>
            <option value="Nigeria">Nigeria</option>
            <option value="Ghana">Ghana</option>
            <option value="South Africa">South Africa</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Min 8 characters" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password" required>
          </div>
        </div>

        <button type="submit" class="btn-full">Create Account — It's Free</button>

        <div class="terms">
          By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Risk Disclosure</a>. 
          Trading binary options carries substantial risk of loss.
        </div>
      </form>

      <div class="auth-switch" style="margin-top: 1.5rem;">
        Already have an account? <a href="login.html" class="auth-link">Sign in</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
